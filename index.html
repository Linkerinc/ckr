// ═══════════════════════════════════════════════════════════════════
// Firebase 초기화 & 데이터 훅
// ═══════════════════════════════════════════════════════════════════
let firebaseApp = null;
let dbRef = null;
let firebaseInitialized = false;
let firebaseError = null;

try {
  if (FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.includes('REPLACE_ME')) {
    firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
    dbRef = firebase.database().ref(TRIP_KEY);
    firebaseInitialized = true;
  } else {
    firebaseError = '⚙️ Firebase 설정이 필요합니다. index.html 상단의 FIREBASE_CONFIG를 수정하세요.';
  }
} catch (e) {
  firebaseError = 'Firebase 초기화 실패: ' + e.message;
}

// ═══════════════════════════════════════════════════════════════════
// 메인 앱
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [tasks, setTasks] = useState(DEFAULT_TASKS);
  const [taskStatus, setTaskStatus] = useState({});
  const [members, setMembers] = useState(DEFAULT_MEMBERS);
  const [loading, setLoading] = useState(true);
  const [connectionStatus, setConnectionStatus] = useState('connecting');
  const [filterAssignee, setFilterAssignee] = useState('all');
  const [filterStatus, setFilterStatus] = useState('all');
  const [editingMemo, setEditingMemo] = useState(null);
  const [collapsedPhases, setCollapsedPhases] = useState({});
  const [today] = useState(new Date());
  const [saveStatus, setSaveStatus] = useState('');
  const [showMemberManager, setShowMemberManager] = useState(false);
  const [taskModalState, setTaskModalState] = useState(null);
  const [editMode, setEditMode] = useState(false);
  const [showShareModal, setShowShareModal] = useState(false);
  const isRemoteUpdate = useRef(false);

  // Firebase 실시간 리스너
  useEffect(() => {
    if (!firebaseInitialized) {
      setLoading(false);
      setConnectionStatus('error');
      return;
    }

    // 연결 상태 모니터링
    const connectedRef = firebase.database().ref('.info/connected');
    const onConnect = connectedRef.on('value', (snap) => {
      setConnectionStatus(snap.val() ? 'connected' : 'disconnected');
    });

    // 데이터 리스너
    const onData = dbRef.on('value', (snapshot) => {
      const data = snapshot.val();
      isRemoteUpdate.current = true;
      if (data) {
        setTasks(data.tasks || DEFAULT_TASKS);
        setTaskStatus(data.taskStatus || {});
        setMembers(data.members || DEFAULT_MEMBERS);
      } else {
        // 최초 접속: 기본값 업로드
        dbRef.set({
          tasks: DEFAULT_TASKS,
          taskStatus: {},
          members: DEFAULT_MEMBERS,
          lastUpdated: new Date().toISOString(),
          createdAt: new Date().toISOString(),
        });
      }
      setLoading(false);
      setTimeout(() => { isRemoteUpdate.current = false; }, 100);
    }, (err) => {
      console.error('Firebase read error', err);
      setConnectionStatus('error');
      setLoading(false);
    });

    return () => {
      dbRef.off('value', onData);
      connectedRef.off('value', onConnect);
    };
  }, []);

  // 저장
  const saveData = async (override = {}) => {
    if (!firebaseInitialized) return;
    setSaveStatus('saving');
    try {
      await dbRef.update({
        tasks: override.tasks !== undefined ? override.tasks : tasks,
        taskStatus: override.taskStatus !== undefined ? override.taskStatus : taskStatus,
        members: override.members !== undefined ? override.members : members,
        lastUpdated: new Date().toISOString(),
      });
      setSaveStatus('saved');
      setTimeout(() => setSaveStatus(''), 1500);
    } catch (err) {
      setSaveStatus('error');
      setTimeout(() => setSaveStatus(''), 2000);
    }
  };

  const toggleTask = (taskId) => {
    const current = taskStatus[taskId] || {};
    const updated = { ...taskStatus, [taskId]: { ...current, done: !current.done, completedAt: !current.done ? new Date().toISOString() : null } };
    setTaskStatus(updated);
    saveData({ taskStatus: updated });
  };

  const changeAssignee = (taskId, memberId) => {
    const current = taskStatus[taskId] || {};
    const updated = { ...taskStatus, [taskId]: { ...current, assignee: memberId } };
    setTaskStatus(updated);
    saveData({ taskStatus: updated });
  };

  const saveMemo = (taskId, memo) => {
    const current = taskStatus[taskId] || {};
    const updated = { ...taskStatus, [taskId]: { ...current, memo } };
    setTaskStatus(updated);
    saveData({ taskStatus: updated });
    setEditingMemo(null);
  };

  const addTask = (phase, data) => {
    const newTask = {
      id: `t-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`,
      phase, title: data.title, detail: data.detail || '',
      defaultAssignee: data.defaultAssignee || 'unassigned',
      priority: data.priority || 'medium',
    };
    const updated = [...tasks, newTask];
    setTasks(updated);
    saveData({ tasks: updated });
  };

  const updateTask = (taskId, data) => {
    const updated = tasks.map(t => t.id === taskId ? { ...t, ...data } : t);
    setTasks(updated);
    saveData({ tasks: updated });
  };

  const deleteTask = (taskId) => {
    if (!window.confirm('이 항목을 삭제하시겠습니까?')) return;
    const updatedTasks = tasks.filter(t => t.id !== taskId);
    const newStatus = { ...taskStatus };
    delete newStatus[taskId];
    setTasks(updatedTasks);
    setTaskStatus(newStatus);
    saveData({ tasks: updatedTasks, taskStatus: newStatus });
  };

  const addMember = (name, icon, color) => {
    const newMember = { id: `m-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`, name, icon, color };
    const others = members.filter(m => m.id !== 'unassigned');
    const unassigned = members.find(m => m.id === 'unassigned');
    const updated = [...others, newMember, unassigned].filter(Boolean);
    setMembers(updated);
    saveData({ members: updated });
  };

  const updateMember = (memberId, data) => {
    const updated = members.map(m => m.id === memberId ? { ...m, ...data } : m);
    setMembers(updated);
    saveData({ members: updated });
  };

  const deleteMember = (memberId) => {
    if (memberId === 'unassigned') return;
    if (!window.confirm('이 담당자를 삭제하시겠습니까?\n해당 담당자에게 배정된 항목은 "미배정"으로 변경됩니다.')) return;
    const updatedMembers = members.filter(m => m.id !== memberId);
    const updatedStatus = { ...taskStatus };
    Object.keys(updatedStatus).forEach(tid => {
      if (updatedStatus[tid].assignee === memberId) updatedStatus[tid] = { ...updatedStatus[tid], assignee: 'unassigned' };
    });
    const updatedTasks = tasks.map(t => t.defaultAssignee === memberId ? { ...t, defaultAssignee: 'unassigned' } : t);
    setMembers(updatedMembers);
    setTaskStatus(updatedStatus);
    setTasks(updatedTasks);
    saveData({ members: updatedMembers, taskStatus: updatedStatus, tasks: updatedTasks });
  };

  const togglePhase = (phaseId) => setCollapsedPhases({ ...collapsedPhases, [phaseId]: !collapsedPhases[phaseId] });

  const resetCheckmarks = () => {
    if (window.confirm('체크 상태와 메모를 초기화하시겠습니까? (태스크/담당자는 유지됩니다)')) {
      setTaskStatus({});
      saveData({ taskStatus: {} });
    }
  };

  const restoreDefaults = () => {
    if (!window.confirm('모든 태스크와 담당자를 기본값으로 복원하시겠습니까?\n(체크 상태, 메모, 직접 추가한 모든 항목이 사라집니다)')) return;
    setTasks(DEFAULT_TASKS);
    setMembers(DEFAULT_MEMBERS);
    setTaskStatus({});
    saveData({ tasks: DEFAULT_TASKS, members: DEFAULT_MEMBERS, taskStatus: {} });
  };

  const dDay = useMemo(() => Math.ceil((DEPARTURE_DATE - today) / (1000 * 60 * 60 * 24)), [today]);

  const stats = useMemo(() => {
    const total = tasks.length;
    const done = tasks.filter(t => taskStatus[t.id]?.done).length;
    const critical = tasks.filter(t => t.priority === 'critical');
    const criticalDone = critical.filter(t => taskStatus[t.id]?.done).length;
    const byMember = {};
    members.forEach(m => {
      const assigned = tasks.filter(t => {
        const a = taskStatus[t.id]?.assignee || t.defaultAssignee;
        return a === m.id;
      });
      const completed = assigned.filter(t => taskStatus[t.id]?.done).length;
      byMember[m.id] = { total: assigned.length, done: completed };
    });
    return { total, done, percent: total ? Math.round((done / total) * 100) : 0, byMember, critical: critical.length, criticalDone };
  }, [taskStatus, members, tasks]);

  const phaseStats = useMemo(() => {
    const result = {};
    PHASES.forEach(p => {
      const phaseTasks = tasks.filter(t => t.phase === p.id);
      const done = phaseTasks.filter(t => taskStatus[t.id]?.done).length;
      result[p.id] = { total: phaseTasks.length, done, percent: phaseTasks.length ? Math.round((done / phaseTasks.length) * 100) : 0 };
    });
    return result;
  }, [taskStatus, tasks]);

  const filterTasks = (taskList) => taskList.filter(t => {
    const status = taskStatus[t.id] || {};
    const assignee = status.assignee || t.defaultAssignee;
    if (filterAssignee !== 'all' && assignee !== filterAssignee) return false;
    if (filterStatus === 'done' && !status.done) return false;
    if (filterStatus === 'todo' && status.done) return false;
    return true;
  });

  const getMember = (id) => members.find(m => m.id === id) || members.find(m => m.id === 'unassigned') || { id: 'unassigned', name: '미배정', color: '#6B7280', icon: '❔' };

  const priorityLabels = {
    critical: { label: '🚨 핵심', color: '#DC2626', bg: '#FEE2E2' },
    high: { label: '⭐ 중요', color: '#C2410C', bg: '#FFEDD5' },
    medium: { label: '보통', color: '#854D0E', bg: '#FEF3C7' },
    low: { label: '여유', color: '#6B7280', bg: '#F3F4F6' },
  };

  // Firebase 미설정 안내
  if (firebaseError) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#FEF6E4', padding: '20px' }}>
        <div style={{ maxWidth: '500px', background: 'white', borderRadius: '20px', padding: '32px', boxShadow: '0 10px 40px rgba(124, 45, 18, 0.12)' }}>
          <div style={{ fontSize: '48px', marginBottom: '16px', textAlign: 'center' }}>⚙️</div>
          <h2 style={{ fontSize: '20px', fontWeight: 800, color: '#7C2D12', margin: '0 0 12px 0', textAlign: 'center' }}>Firebase 설정 필요</h2>
          <p style={{ fontSize: '14px', color: '#6B7280', lineHeight: 1.7, margin: '0 0 16px 0' }}>
            가족 공유 기능을 사용하려면 Firebase Realtime Database 설정이 필요합니다.
            <strong style={{ color: '#7C2D12' }}> index.html 상단의 FIREBASE_CONFIG 객체</strong>를 본인의 Firebase 프로젝트 정보로 교체하세요.
          </p>
          <div style={{ background: '#FEF3C7', padding: '14px', borderRadius: '12px', fontSize: '12px', color: '#7C2D12', lineHeight: 1.8 }}>
            <strong>셋업 가이드:</strong><br/>
            1. Firebase Console에서 새 프로젝트 생성<br/>
            2. Realtime Database 활성화 (asia-southeast1 권장)<br/>
            3. 보안 규칙: <code>".read": true, ".write": true</code><br/>
            4. 웹 앱 등록 후 설정 정보를 복사<br/>
            5. 이 파일 상단의 FIREBASE_CONFIG 객체에 붙여넣기<br/>
            6. GitHub Pages에 푸시 → 가족 공유 끝!
          </div>
          <p style={{ fontSize: '12px', color: '#9CA3AF', marginTop: '14px', textAlign: 'center' }}>
            자세한 가이드는 README.md를 참고하세요.
          </p>
        </div>
      </div>
    );
  }

  if (loading) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#FEF6E4' }}>
        <div style={{ textAlign: 'center', color: '#8B2C20' }}>
          <I.Plane size={48} style={{ animation: 'fly 2s ease-in-out infinite' }} />
          <div style={{ fontSize: '18px', marginTop: '16px' }}>가족 데이터를 불러오는 중...</div>
          <div style={{ fontSize: '12px', marginTop: '8px', opacity: 0.6 }}>Firebase 동기화 중</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{
      minHeight: '100vh',
      background: 'linear-gradient(180deg, #FEF6E4 0%, #FFF8E7 100%)',
      paddingBottom: '60px',
    }}>
      <header style={{
        background: 'linear-gradient(135deg, #7C2D12 0%, #B45309 50%, #C2410C 100%)',
        color: 'white', padding: '32px 16px 56px', position: 'relative', overflow: 'hidden',
      }}>
        <div style={{ position: 'absolute', top: 30, right: 40, opacity: 0.15, fontSize: '120px', transform: 'rotate(-15deg)' }}>🍁</div>
        <div style={{ position: 'absolute', bottom: 20, left: 40, opacity: 0.1, fontSize: '100px', transform: 'rotate(20deg)' }}>🍂</div>

        <div style={{ maxWidth: '1200px', margin: '0 auto', position: 'relative' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px', flexWrap: 'wrap', gap: '8px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px', opacity: 0.9, letterSpacing: '0.1em' }}>
              <I.Sparkles size={13} /> JAPAN AUTUMN 2026 · KYUSHU
              <ConnectionPill status={connectionStatus} />
            </div>
            <div style={{ display: 'flex', gap: '6px' }}>
              <button onClick={() => setShowShareModal(true)}
                style={{
                  padding: '6px 12px', fontSize: '12px',
                  background: 'rgba(255,255,255,0.15)', color: 'white',
                  border: '1px solid rgba(255,255,255,0.3)', borderRadius: '20px',
                  cursor: 'pointer', fontWeight: 700,
                  display: 'flex', alignItems: 'center', gap: '5px',
                  backdropFilter: 'blur(10px)',
                }}>
                <I.Share size={12} /> 공유
              </button>
              <button onClick={() => setEditMode(!editMode)}
                style={{
                  padding: '6px 12px', fontSize: '12px',
                  background: editMode ? 'white' : 'rgba(255,255,255,0.15)',
                  color: editMode ? '#7C2D12' : 'white',
                  border: '1px solid rgba(255,255,255,0.3)', borderRadius: '20px',
                  cursor: 'pointer', fontWeight: 700,
                  display: 'flex', alignItems: 'center', gap: '5px',
                  backdropFilter: 'blur(10px)',
                }}>
                <I.Settings size={12} />
                {editMode ? '편집 끄기' : '편집'}
              </button>
            </div>
          </div>

          <h1 style={{ fontSize: 'clamp(24px, 5vw, 40px)', fontWeight: 800, margin: '0 0 6px 0', lineHeight: 1.2, letterSpacing: '-0.02em' }}>
            장인어른 · 장모님 칠순여행
          </h1>
          <p style={{ fontSize: '15px', opacity: 0.9, margin: '0 0 28px 0', fontWeight: 300 }}>
            준비 타임라인 · 가족 공유 보드
          </p>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '10px' }}>
            <StatCard label="OUTBOUND" value={`D-${dDay > 0 ? dDay : Math.abs(dDay) === 0 ? 'DAY' : `+${Math.abs(dDay)}`}`}
              sub={<><I.Calendar size={11} /> 2026.11.17(화)</>} />
            <StatCard label="PROGRESS" value={`${stats.percent}%`} sub={`${stats.done} / ${stats.total} 완료`} progress={stats.percent} />
            <StatCard label="🚨 CRITICAL" value={<>{stats.criticalDone}<span style={{ opacity: 0.5, fontSize: '22px' }}>/{stats.critical}</span></>} sub="핵심 작업 완료" />
            <StatCard label={<><I.MapPin size={10} /> DESTINATION</>} value={<span style={{ fontSize: '20px' }}>큐슈 3박 4일</span>} sub="벳부·유후인·후쿠오카" />
          </div>
        </div>
      </header>

      <section style={{ maxWidth: '1200px', margin: '-26px auto 0', padding: '0 16px', position: 'relative' }}>
        <div style={{
          background: 'white', borderRadius: '18px', padding: '20px',
          boxShadow: '0 10px 40px rgba(124, 45, 18, 0.12)',
          border: '1px solid rgba(124, 45, 18, 0.08)',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '14px', flexWrap: 'wrap', gap: '8px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
              <I.Users size={16} stroke="#7C2D12" />
              <h2 style={{ fontSize: '14px', fontWeight: 700, margin: 0, color: '#7C2D12' }}>담당자별 진행</h2>
            </div>
            <button onClick={() => setShowMemberManager(true)}
              style={{
                padding: '5px 12px', fontSize: '12px', background: '#FEF3C7', color: '#7C2D12',
                border: '1px solid #FDE68A', borderRadius: '14px', cursor: 'pointer', fontWeight: 700,
                display: 'flex', alignItems: 'center', gap: '5px',
              }}>
              <I.UserPlus size={12} /> 담당자 관리
            </button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))', gap: '10px' }}>
            {members.filter(m => m.id !== 'unassigned').map(m => {
              const s = stats.byMember[m.id] || { total: 0, done: 0 };
              const pct = s.total ? Math.round((s.done / s.total) * 100) : 0;
              return (
                <div key={m.id} style={{ padding: '12px', background: '#FAFAF9', borderRadius: '10px', border: '1px solid #F3F0EB' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '6px' }}>
                    <span style={{ fontSize: '17px' }}>{m.icon}</span>
                    <span style={{ fontSize: '12px', fontWeight: 600, color: m.color, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{m.name}</span>
                  </div>
                  <div style={{ fontSize: '18px', fontWeight: 800, color: '#1F2937' }}>
                    {s.done}<span style={{ opacity: 0.4, fontSize: '13px', fontWeight: 600 }}>/{s.total}</span>
                  </div>
                  <div style={{ height: '4px', background: '#EDE9E3', borderRadius: '2px', marginTop: '6px', overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${pct}%`, background: m.color, transition: 'width 0.5s' }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </section>

      <section style={{ maxWidth: '1200px', margin: '20px auto', padding: '0 16px' }}>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', alignItems: 'center' }}>
          <I.Filter size={14} stroke="#7C2D12" />
          <span style={{ fontSize: '12px', color: '#7C2D12', fontWeight: 600 }}>필터:</span>

          <select value={filterAssignee} onChange={e => setFilterAssignee(e.target.value)}
            style={{
              padding: '5px 24px 5px 12px', borderRadius: '18px', border: '1px solid #E7E2D6',
              fontSize: '12px', background: 'white', cursor: 'pointer', color: '#1F2937', appearance: 'none',
              backgroundImage: 'url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns=\'http://www.w3.org/2000/svg\' width=\'10\' height=\'10\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%237C2D12\' stroke-width=\'2\'%3e%3cpolyline points=\'6 9 12 15 18 9\'/%3e%3c/svg%3e")',
              backgroundRepeat: 'no-repeat', backgroundPosition: 'right 8px center',
            }}>
            <option value="all">전체 담당자</option>
            {members.map(m => <option key={m.id} value={m.id}>{m.icon} {m.name}</option>)}
          </select>

          <div style={{ display: 'flex', gap: '3px', background: 'white', padding: '3px', borderRadius: '18px', border: '1px solid #E7E2D6' }}>
            {[{ value: 'all', label: '전체' }, { value: 'todo', label: '미완료' }, { value: 'done', label: '완료' }].map(opt => (
              <button key={opt.value} onClick={() => setFilterStatus(opt.value)}
                style={{
                  padding: '3px 10px', fontSize: '11px', border: 'none', borderRadius: '14px',
                  cursor: 'pointer', fontWeight: 600,
                  background: filterStatus === opt.value ? '#7C2D12' : 'transparent',
                  color: filterStatus === opt.value ? 'white' : '#7C2D12',
                }}>
                {opt.label}
              </button>
            ))}
          </div>

          <div style={{ marginLeft: 'auto', display: 'flex', gap: '5px', alignItems: 'center' }}>
            {saveStatus === 'saving' && <span style={{ fontSize: '11px', color: '#6B7280', animation: 'pulse 1s infinite' }}>↑ 동기화</span>}
            {saveStatus === 'saved' && <span style={{ fontSize: '11px', color: '#15803D' }}>✓ 저장됨</span>}
            {saveStatus === 'error' && <span style={{ fontSize: '11px', color: '#DC2626' }}>저장 실패</span>}

            <button onClick={() => window.print()} className="desktop-only"
              style={{ padding: '5px 10px', fontSize: '11px', background: 'white', border: '1px solid #E7E2D6', borderRadius: '14px', cursor: 'pointer', color: '#7C2D12', display: 'flex', alignItems: 'center', gap: '3px' }}>
              <I.Printer size={11} /> 인쇄
            </button>
            <button onClick={resetCheckmarks}
              style={{ padding: '5px 10px', fontSize: '11px', background: 'white', border: '1px solid #FFEDD5', borderRadius: '14px', cursor: 'pointer', color: '#C2410C', display: 'flex', alignItems: 'center', gap: '3px' }}>
              <I.Reset size={11} /> 체크 초기화
            </button>
            {editMode && (
              <button onClick={restoreDefaults}
                style={{ padding: '5px 10px', fontSize: '11px', background: '#FEE2E2', border: '1px solid #FECACA', borderRadius: '14px', cursor: 'pointer', color: '#DC2626', fontWeight: 600 }}>
                기본값 복원
              </button>
            )}
          </div>
        </div>

        {editMode && (
          <div style={{
            marginTop: '10px', padding: '10px 14px',
            background: 'linear-gradient(90deg, #FEF3C7 0%, #FED7AA 100%)',
            borderRadius: '12px', border: '1px solid #FBBF24',
            fontSize: '12px', color: '#7C2D12',
            display: 'flex', alignItems: 'center', gap: '6px',
          }}>
            <I.Settings size={14} />
            <strong>편집 모드 ON</strong> — 항목 옆 연필/휴지통으로 수정·삭제, 페이즈 하단 "+" 로 새 항목 추가
          </div>
        )}
      </section>

      <main style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 16px' }}>
        {PHASES.map((phase, phaseIdx) => {
          const phaseTasks = tasks.filter(t => t.phase === phase.id);
          const filteredTasks = filterTasks(phaseTasks);
          const ps = phaseStats[phase.id];
          const isCollapsed = collapsedPhases[phase.id];
          const allDone = ps && ps.total > 0 && ps.done === ps.total;

          if (filteredTasks.length === 0 && phaseTasks.length > 0 && (filterAssignee !== 'all' || filterStatus !== 'all') && !editMode) return null;

          return (
            <div key={phase.id} style={{ marginBottom: '18px', position: 'relative' }}>
              <div onClick={() => togglePhase(phase.id)}
                style={{
                  display: 'flex', alignItems: 'center', gap: '14px', padding: '14px 18px',
                  background: allDone ? '#F0FDF4' : phase.bg, borderRadius: '14px',
                  cursor: 'pointer', border: `2px solid ${allDone ? '#86EFAC' : phase.color}33`,
                  marginBottom: '10px',
                }}>
                <div style={{
                  minWidth: '48px', height: '48px', borderRadius: '50%',
                  background: allDone ? '#16A34A' : phase.color, color: 'white',
                  display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                  fontWeight: 800, fontSize: '12px', letterSpacing: '-0.02em', lineHeight: 1,
                  boxShadow: `0 5px 14px ${phase.color}40`,
                }}>
                  {allDone ? <I.CheckFill size={22} /> : <>
                    <div style={{ fontSize: '8px', opacity: 0.8, fontWeight: 600 }}>{phase.name}</div>
                    <div style={{ fontSize: '10px', marginTop: '2px' }}>{phaseIdx + 1}/10</div>
                  </>}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: '8px', flexWrap: 'wrap' }}>
                    <h3 style={{ fontSize: '17px', fontWeight: 800, margin: 0, color: phase.color, letterSpacing: '-0.02em' }}>{phase.label}</h3>
                    <span style={{ fontSize: '12px', color: phase.color, opacity: 0.8 }}>{phase.subtitle}</span>
                  </div>
                  <div style={{ fontSize: '11px', color: '#6B7280', marginTop: '3px' }}>
                    {phase.dMax > 0 ? `D-${phase.dMax} ~ D-${phase.dMin}` : 'D-Day'} · {ps.done}/{ps.total} 완료
                  </div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                  <div style={{ width: '60px', height: '5px', background: 'rgba(0,0,0,0.08)', borderRadius: '3px', overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${ps.percent}%`, background: allDone ? '#16A34A' : phase.color, transition: 'width 0.5s' }} />
                  </div>
                  <span style={{ fontSize: '13px', fontWeight: 700, color: phase.color, minWidth: '34px', textAlign: 'right' }}>{ps.percent}%</span>
                  {isCollapsed ? <I.ChevronDown size={16} stroke={phase.color} /> : <I.ChevronUp size={16} stroke={phase.color} />}
                </div>
              </div>

              {!isCollapsed && (
                <div style={{ paddingLeft: '20px', borderLeft: `3px solid ${phase.color}`, marginLeft: '24px' }}>
                  {filteredTasks.map((task) => {
                    const status = taskStatus[task.id] || {};
                    const assignee = getMember(status.assignee || task.defaultAssignee);
                    const isDone = status.done;
                    const memo = status.memo || '';
                    const priority = priorityLabels[task.priority];

                    return (
                      <div key={task.id} style={{
                        background: 'white', borderRadius: '12px', padding: '14px', marginBottom: '8px',
                        border: `1px solid ${isDone ? '#D1FAE5' : '#F3F0EB'}`,
                        position: 'relative', opacity: isDone ? 0.7 : 1,
                        boxShadow: '0 1px 3px rgba(0,0,0,0.04)',
                      }}>
                        <div style={{
                          position: 'absolute', left: -23, top: '18px',
                          width: '10px', height: '10px',
                          background: isDone ? '#16A34A' : assignee.color,
                          borderRadius: '50%', border: '3px solid #FEF6E4',
                          boxShadow: `0 0 0 2px ${isDone ? '#16A34A' : assignee.color}`,
                        }} />

                        <div style={{ display: 'flex', gap: '12px', alignItems: 'flex-start' }}>
                          <button onClick={() => toggleTask(task.id)}
                            style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 0, marginTop: '2px', color: isDone ? '#16A34A' : '#D1D5DB', flexShrink: 0 }}>
                            {isDone ? <I.CheckFill size={24} /> : <I.Circle size={24} />}
                          </button>

                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: 'flex', alignItems: 'flex-start', gap: '6px', flexWrap: 'wrap', marginBottom: '4px' }}>
                              <h4 style={{
                                fontSize: '14px', fontWeight: 700, margin: 0,
                                color: isDone ? '#6B7280' : '#1F2937',
                                textDecoration: isDone ? 'line-through' : 'none',
                                lineHeight: 1.4, flex: 1,
                              }}>{task.title}</h4>
                              <span style={{
                                fontSize: '10px', fontWeight: 700, padding: '2px 7px',
                                borderRadius: '10px', background: priority.bg, color: priority.color,
                                whiteSpace: 'nowrap',
                              }}>{priority.label}</span>
                              {editMode && (
                                <div style={{ display: 'flex', gap: '3px' }}>
                                  <button onClick={() => setTaskModalState({ mode: 'edit', task })} style={iconBtnStyle('#7C2D12')} title="편집">
                                    <I.Pencil size={12} />
                                  </button>
                                  <button onClick={() => deleteTask(task.id)} style={iconBtnStyle('#DC2626')} title="삭제">
                                    <I.Trash size={12} />
                                  </button>
                                </div>
                              )}
                            </div>

                            {task.detail && <p style={{ fontSize: '12px', color: '#6B7280', margin: '0 0 10px 0', lineHeight: 1.6 }}>{task.detail}</p>}

                            {editingMemo === task.id ? (
                              <MemoEditor initial={memo} onSave={(m) => saveMemo(task.id, m)} onCancel={() => setEditingMemo(null)} />
                            ) : memo ? (
                              <div onClick={() => setEditingMemo(task.id)}
                                style={{
                                  background: '#FFFBEB', border: '1px solid #FEF3C7', borderRadius: '8px',
                                  padding: '7px 11px', fontSize: '12px', color: '#92400E', marginBottom: '10px',
                                  cursor: 'pointer', display: 'flex', justifyContent: 'space-between',
                                  alignItems: 'flex-start', gap: '6px',
                                }}>
                                <span>💬 {memo}</span>
                                <I.Edit size={11} style={{ opacity: 0.6, flexShrink: 0, marginTop: '2px' }} />
                              </div>
                            ) : null}

                            <div style={{ display: 'flex', alignItems: 'center', gap: '6px', flexWrap: 'wrap' }}>
                              <select value={status.assignee || task.defaultAssignee}
                                onChange={(e) => changeAssignee(task.id, e.target.value)}
                                style={{
                                  padding: '4px 22px 4px 9px', fontSize: '11px', borderRadius: '13px',
                                  border: `1.5px solid ${assignee.color}33`, background: `${assignee.color}10`,
                                  color: assignee.color, fontWeight: 700, cursor: 'pointer', appearance: 'none',
                                  backgroundImage: `url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='${encodeURIComponent(assignee.color)}' stroke-width='3'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e")`,
                                  backgroundRepeat: 'no-repeat', backgroundPosition: 'right 7px center',
                                }}>
                                {members.map(m => <option key={m.id} value={m.id}>{m.icon} {m.name}</option>)}
                              </select>

                              {!memo && editingMemo !== task.id && (
                                <button onClick={() => setEditingMemo(task.id)}
                                  style={{
                                    padding: '3px 9px', fontSize: '10px', background: 'transparent',
                                    border: '1px dashed #D1D5DB', borderRadius: '13px', color: '#6B7280',
                                    cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '3px',
                                  }}>
                                  <I.Edit size={10} /> 메모
                                </button>
                              )}

                              {status.completedAt && (
                                <span style={{ fontSize: '10px', color: '#16A34A', marginLeft: 'auto' }}>
                                  ✓ {new Date(status.completedAt).toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' })}
                                </span>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}

                  {editMode && (
                    <button onClick={() => setTaskModalState({ mode: 'add', phase: phase.id })}
                      style={{
                        width: '100%', padding: '12px',
                        background: 'transparent', border: `2px dashed ${phase.color}66`,
                        borderRadius: '12px', color: phase.color,
                        fontSize: '12px', fontWeight: 700, cursor: 'pointer',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '5px', marginTop: '8px',
                      }}>
                      <I.Plus size={13} /> {phase.label}에 새 항목 추가
                    </button>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </main>

      <footer style={{ maxWidth: '1200px', margin: '32px auto 0', padding: '0 16px' }}>
        <div style={{
          background: 'linear-gradient(135deg, #FEF3C7 0%, #FED7AA 100%)',
          borderRadius: '18px', padding: '22px', border: '1px solid #FDBA74',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '10px' }}>
            <I.Share size={18} stroke="#9A3412" />
            <h3 style={{ fontSize: '16px', fontWeight: 800, color: '#7C2D12', margin: 0 }}>가족과 함께 사용하세요</h3>
          </div>
          <p style={{ fontSize: '13px', color: '#7C2D12', margin: '0 0 14px 0', lineHeight: 1.7 }}>
            이 페이지는 Firebase로 실시간 동기화됩니다. 가족 누구나 같은 링크로 접속하면 동일한 진행 상황을 보실 수 있습니다.
            폰에서 홈 화면에 추가하면 앱처럼 쓰실 수 있어요.
          </p>
          <button onClick={() => setShowShareModal(true)} style={primaryBtnStyle}>
            <I.Share size={13} /> 가족에게 공유 링크 보내기
          </button>
        </div>

        <div style={{ textAlign: 'center', marginTop: '20px', fontSize: '11px', color: '#9CA3AF' }}>
          🍁 장인어른 · 장모님 칠순 여행 준비 보드 · JAPAN AUTUMN 2026 🍂
        </div>
      </footer>

      {showMemberManager && (
        <MemberManagerModal members={members} onClose={() => setShowMemberManager(false)}
          onAdd={addMember} onUpdate={updateMember} onDelete={deleteMember} />
      )}
      {taskModalState && (
        <TaskEditorModal mode={taskModalState.mode} task={taskModalState.task} phaseId={taskModalState.phase}
          members={members} onClose={() => setTaskModalState(null)}
          onSave={(data) => {
            if (taskModalState.mode === 'add') addTask(data.phase, data);
            else updateTask(taskModalState.task.id, data);
            setTaskModalState(null);
          }} />
      )}
      {showShareModal && <ShareModal onClose={() => setShowShareModal(false)} />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// 보조 컴포넌트
// ═══════════════════════════════════════════════════════════════════
function ConnectionPill({ status }) {
  const config = {
    connecting: { bg: 'rgba(255,200,100,0.2)', color: '#FEF3C7', icon: <I.Wifi size={10} />, text: '연결 중...' },
    connected: { bg: 'rgba(120,255,150,0.2)', color: '#D1FAE5', icon: <I.Wifi size={10} />, text: '실시간 동기화' },
    disconnected: { bg: 'rgba(255,150,100,0.2)', color: '#FED7AA', icon: <I.WifiOff size={10} />, text: '오프라인' },
    error: { bg: 'rgba(255,100,100,0.2)', color: '#FEE2E2', icon: <I.WifiOff size={10} />, text: '연결 실패' },
  }[status] || { bg: 'rgba(255,255,255,0.1)', color: 'white', icon: null, text: '' };
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: '4px',
      padding: '2px 8px', borderRadius: '10px',
      background: config.bg, color: config.color, fontSize: '10px', fontWeight: 600,
    }}>
      {config.icon} {config.text}
    </span>
  );
}

function StatCard({ label, value, sub, progress }) {
  return (
    <div style={{
      background: 'rgba(255,255,255,0.12)', backdropFilter: 'blur(10px)',
      borderRadius: '14px', padding: '16px', border: '1px solid rgba(255,255,255,0.2)',
    }}>
      <div style={{ fontSize: '10px', opacity: 0.8, marginBottom: '4px', letterSpacing: '0.1em', display: 'flex', alignItems: 'center', gap: '3px' }}>{label}</div>
      <div style={{ fontSize: '32px', fontWeight: 800, lineHeight: 1 }}>{value}</div>
      <div style={{ fontSize: '12px', opacity: 0.85, marginTop: '5px', display: 'flex', alignItems: 'center', gap: '3px' }}>{sub}</div>
      {progress !== undefined && (
        <div style={{ height: '3px', background: 'rgba(255,255,255,0.2)', borderRadius: '2px', marginTop: '6px', overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${progress}%`, background: '#FDE68A', transition: 'width 0.5s' }} />
        </div>
      )}
    </div>
  );
}

function MemoEditor({ initial, onSave, onCancel }) {
  const [value, setValue] = useState(initial || '');
  return (
    <div style={{ marginBottom: '10px' }}>
      <textarea value={value} onChange={(e) => setValue(e.target.value)} autoFocus
        placeholder="메모를 입력하세요. (예: 영등포 구청 6월 10일 예약 완료)"
        style={{
          width: '100%', minHeight: '60px', padding: '9px 11px', fontSize: '12px',
          border: '1.5px solid #FDBA74', borderRadius: '9px', resize: 'vertical',
          background: '#FFFBEB', color: '#1F2937', boxSizing: 'border-box',
        }} />
      <div style={{ display: 'flex', gap: '5px', marginTop: '5px' }}>
        <button onClick={() => onSave(value)} style={{
          padding: '4px 12px', fontSize: '11px', background: '#7C2D12', color: 'white',
          border: 'none', borderRadius: '12px', cursor: 'pointer', fontWeight: 600,
          display: 'flex', alignItems: 'center', gap: '3px',
        }}><I.Save size={11} /> 저장</button>
        <button onClick={onCancel} style={{
          padding: '4px 12px', fontSize: '11px', background: 'white', color: '#6B7280',
          border: '1px solid #E7E2D6', borderRadius: '12px', cursor: 'pointer', fontWeight: 600,
          display: 'flex', alignItems: 'center', gap: '3px',
        }}><I.X size={11} /> 취소</button>
      </div>
    </div>
  );
}

function MemberManagerModal({ members, onClose, onAdd, onUpdate, onDelete }) {
  const [editingId, setEditingId] = useState(null);
  const [showAddForm, setShowAddForm] = useState(false);
  const [newName, setNewName] = useState('');
  const [newIcon, setNewIcon] = useState(ICON_OPTIONS[0]);
  const [newColor, setNewColor] = useState(COLOR_PALETTE[0]);

  const handleAdd = () => {
    if (!newName.trim()) { alert('이름을 입력해주세요.'); return; }
    onAdd(newName.trim(), newIcon, newColor);
    setNewName(''); setNewIcon(ICON_OPTIONS[0]); setNewColor(COLOR_PALETTE[0]); setShowAddForm(false);
  };

  return (
    <ModalOverlay onClose={onClose}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '18px' }}>
        <h2 style={{ fontSize: '18px', fontWeight: 800, margin: 0, color: '#7C2D12' }}>담당자 관리</h2>
        <button onClick={onClose} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: '4px', color: '#6B7280' }}>
          <I.X size={20} />
        </button>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '14px' }}>
        {members.filter(m => m.id !== 'unassigned').map(m => (
          editingId === m.id ? (
            <MemberEditRow key={m.id} member={m}
              onSave={(data) => { onUpdate(m.id, data); setEditingId(null); }}
              onCancel={() => setEditingId(null)} />
          ) : (
            <div key={m.id} style={{
              display: 'flex', alignItems: 'center', gap: '10px',
              padding: '10px 12px', background: '#FAFAF9',
              borderRadius: '10px', border: '1px solid #F3F0EB',
            }}>
              <div style={{
                width: '34px', height: '34px', borderRadius: '50%',
                background: `${m.color}20`, display: 'flex',
                alignItems: 'center', justifyContent: 'center', fontSize: '18px',
                border: `2px solid ${m.color}40`, flexShrink: 0,
              }}>{m.icon}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: '13px', fontWeight: 700, color: m.color, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{m.name}</div>
                <div style={{ fontSize: '10px', color: '#9CA3AF', marginTop: '2px' }}>컬러 <span style={{ fontFamily: 'monospace' }}>{m.color}</span></div>
              </div>
              <button onClick={() => setEditingId(m.id)} style={iconBtnStyle('#7C2D12')} title="편집"><I.Pencil size={13} /></button>
              <button onClick={() => onDelete(m.id)} style={iconBtnStyle('#DC2626')} title="삭제"><I.Trash size={13} /></button>
            </div>
          )
        ))}
      </div>

      {showAddForm ? (
        <div style={{ padding: '14px', background: '#FFFBEB', borderRadius: '11px', border: '1.5px solid #FDE68A' }}>
          <h3 style={{ fontSize: '13px', fontWeight: 700, margin: '0 0 10px 0', color: '#7C2D12' }}>새 담당자 추가</h3>
          <label style={labelStyle}>이름</label>
          <input value={newName} onChange={(e) => setNewName(e.target.value)} autoFocus placeholder="예: 첫째 며느리" style={{ ...inputStyle, marginBottom: '10px' }} />
          <label style={labelStyle}>아이콘</label>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '5px', marginBottom: '10px' }}>
            {ICON_OPTIONS.map(ic => (
              <button key={ic} onClick={() => setNewIcon(ic)}
                style={{ width: '34px', height: '34px', fontSize: '18px', background: newIcon === ic ? '#FEF3C7' : 'white', border: newIcon === ic ? '2px solid #C2410C' : '1px solid #E7E2D6', borderRadius: '7px', cursor: 'pointer' }}>{ic}</button>
            ))}
          </div>
          <label style={labelStyle}>색상</label>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '5px', marginBottom: '12px' }}>
            {COLOR_PALETTE.map(c => (
              <button key={c} onClick={() => setNewColor(c)}
                style={{ width: '30px', height: '30px', background: c, borderRadius: '50%', cursor: 'pointer', border: newColor === c ? '3px solid #1F2937' : '1px solid rgba(0,0,0,0.1)' }} />
            ))}
          </div>
          <div style={{ display: 'flex', gap: '6px' }}>
            <button onClick={handleAdd} style={primaryBtnStyle}><I.Plus size={13} /> 추가</button>
            <button onClick={() => { setShowAddForm(false); setNewName(''); }} style={secondaryBtnStyle}>취소</button>
          </div>
        </div>
      ) : (
        <button onClick={() => setShowAddForm(true)}
          style={{
            width: '100%', padding: '12px', background: 'transparent',
            border: '2px dashed #C2410C66', borderRadius: '11px', color: '#C2410C',
            fontSize: '12px', fontWeight: 700, cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '5px',
          }}>
          <I.UserPlus size={14} /> 새 담당자 추가
        </button>
      )}
    </ModalOverlay>
  );
}

function MemberEditRow({ member, onSave, onCancel }) {
  const [name, setName] = useState(member.name);
  const [icon, setIcon] = useState(member.icon);
  const [color, setColor] = useState(member.color);
  return (
    <div style={{ padding: '12px', background: '#FFFBEB', borderRadius: '11px', border: '1.5px solid #FDE68A' }}>
      <input value={name} onChange={(e) => setName(e.target.value)} style={{ ...inputStyle, marginBottom: '8px' }} />
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '3px', marginBottom: '8px' }}>
        {ICON_OPTIONS.map(ic => (
          <button key={ic} onClick={() => setIcon(ic)}
            style={{ width: '30px', height: '30px', fontSize: '16px', background: icon === ic ? '#FEF3C7' : 'white', border: icon === ic ? '2px solid #C2410C' : '1px solid #E7E2D6', borderRadius: '6px', cursor: 'pointer' }}>{ic}</button>
        ))}
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '3px', marginBottom: '10px' }}>
        {COLOR_PALETTE.map(c => (
          <button key={c} onClick={() => setColor(c)}
            style={{ width: '26px', height: '26px', background: c, borderRadius: '50%', cursor: 'pointer', border: color === c ? '3px solid #1F2937' : '1px solid rgba(0,0,0,0.1)' }} />
        ))}
      </div>
      <div style={{ display: 'flex', gap: '5px' }}>
        <button onClick={() => onSave({ name: name.trim(), icon, color })} style={primaryBtnStyle}><I.Save size={11} /> 저장</button>
        <button onClick={onCancel} style={secondaryBtnStyle}>취소</button>
      </div>
    </div>
  );
}

function TaskEditorModal({ mode, task, phaseId, members, onClose, onSave }) {
  const [title, setTitle] = useState(task?.title || '');
  const [detail, setDetail] = useState(task?.detail || '');
  const [priority, setPriority] = useState(task?.priority || 'medium');
  const [defaultAssignee, setDefaultAssignee] = useState(task?.defaultAssignee || 'unassigned');
  const [selectedPhase, setSelectedPhase] = useState(task?.phase || phaseId);

  const handleSave = () => {
    if (!title.trim()) { alert('제목을 입력해주세요.'); return; }
    onSave({ title: title.trim(), detail: detail.trim(), priority, defaultAssignee, phase: selectedPhase });
  };

  const phaseInfo = PHASES.find(p => p.id === selectedPhase);

  return (
    <ModalOverlay onClose={onClose}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '18px' }}>
        <h2 style={{ fontSize: '18px', fontWeight: 800, margin: 0, color: '#7C2D12' }}>
          {mode === 'add' ? '새 준비사항 추가' : '준비사항 편집'}
        </h2>
        <button onClick={onClose} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: '4px', color: '#6B7280' }}><I.X size={20} /></button>
      </div>

      <label style={labelStyle}>시기 (페이즈)</label>
      <select value={selectedPhase} onChange={(e) => setSelectedPhase(e.target.value)} style={{ ...inputStyle, marginBottom: '8px' }}>
        {PHASES.map(p => <option key={p.id} value={p.id}>{p.name} — {p.label} ({p.subtitle})</option>)}
      </select>

      {phaseInfo && (
        <div style={{ padding: '7px 11px', fontSize: '11px', background: phaseInfo.bg, color: phaseInfo.color, borderRadius: '8px', marginBottom: '12px' }}>
          📅 {phaseInfo.dMax > 0 ? `D-${phaseInfo.dMax} ~ D-${phaseInfo.dMin}` : 'D-Day'}
        </div>
      )}

      <label style={labelStyle}>제목 *</label>
      <input value={title} onChange={(e) => setTitle(e.target.value)} autoFocus placeholder="예: 어머님께 드릴 칠순 선물 준비" style={{ ...inputStyle, marginBottom: '12px' }} />

      <label style={labelStyle}>상세 설명</label>
      <textarea value={detail} onChange={(e) => setDetail(e.target.value)} placeholder="추가 안내 사항" style={{ ...inputStyle, minHeight: '60px', resize: 'vertical', marginBottom: '12px' }} />

      <label style={labelStyle}>우선순위</label>
      <div style={{ display: 'flex', gap: '5px', marginBottom: '12px', flexWrap: 'wrap' }}>
        {[
          { v: 'critical', l: '🚨 핵심', c: '#DC2626', bg: '#FEE2E2' },
          { v: 'high', l: '⭐ 중요', c: '#C2410C', bg: '#FFEDD5' },
          { v: 'medium', l: '보통', c: '#854D0E', bg: '#FEF3C7' },
          { v: 'low', l: '여유', c: '#6B7280', bg: '#F3F4F6' },
        ].map(p => (
          <button key={p.v} onClick={() => setPriority(p.v)}
            style={{
              padding: '7px 12px', fontSize: '11px', fontWeight: 700,
              background: priority === p.v ? p.bg : 'white',
              color: priority === p.v ? p.c : '#6B7280',
              border: priority === p.v ? `2px solid ${p.c}` : '1px solid #E7E2D6',
              borderRadius: '18px', cursor: 'pointer',
            }}>{p.l}</button>
        ))}
      </div>

      <label style={labelStyle}>기본 담당자</label>
      <select value={defaultAssignee} onChange={(e) => setDefaultAssignee(e.target.value)} style={{ ...inputStyle, marginBottom: '18px' }}>
        {members.map(m => <option key={m.id} value={m.id}>{m.icon} {m.name}</option>)}
      </select>

      <div style={{ display: 'flex', gap: '6px' }}>
        <button onClick={handleSave} style={primaryBtnStyle}>
          <I.Save size={13} /> {mode === 'add' ? '추가' : '저장'}
        </button>
        <button onClick={onClose} style={secondaryBtnStyle}>취소</button>
      </div>
    </ModalOverlay>
  );
}

function ShareModal({ onClose }) {
  const url = window.location.href;
  const [copied, setCopied] = useState(false);

  const copyLink = async () => {
    try {
      await navigator.clipboard.writeText(url);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (e) {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    }
  };

  const kakaoShare = () => {
    // 카카오톡 공유는 별도 SDK가 필요. 일단 링크 복사 후 안내.
    copyLink();
    alert('링크가 복사되었습니다. 카카오톡 가족방에 붙여넣기 하세요!');
  };

  return (
    <ModalOverlay onClose={onClose}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '18px' }}>
        <h2 style={{ fontSize: '18px', fontWeight: 800, margin: 0, color: '#7C2D12' }}>🍁 가족에게 공유</h2>
        <button onClick={onClose} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: '4px', color: '#6B7280' }}><I.X size={20} /></button>
      </div>

      <p style={{ fontSize: '13px', color: '#6B7280', margin: '0 0 14px 0', lineHeight: 1.6 }}>
        이 링크를 가족에게 공유하면 누구나 같은 페이지를 열어 함께 진행 상황을 관리할 수 있습니다.
      </p>

      <div style={{
        padding: '12px 14px', background: '#FAFAF9',
        border: '1px solid #E7E2D6', borderRadius: '10px',
        fontFamily: 'monospace', fontSize: '12px', color: '#1F2937',
        marginBottom: '12px', wordBreak: 'break-all',
      }}>{url}</div>

      <div style={{ display: 'flex', gap: '6px', marginBottom: '18px' }}>
        <button onClick={copyLink} style={{ ...primaryBtnStyle, flex: 1, justifyContent: 'center' }}>
          <I.Copy size={13} /> {copied ? '복사됨!' : '링크 복사'}
        </button>
        <button onClick={kakaoShare} style={{ ...secondaryBtnStyle, flex: 1, justifyContent: 'center', background: '#FEE500', color: '#3C1E1E', border: 'none', fontWeight: 700, display: 'flex', alignItems: 'center', gap: '4px' }}>
          💬 카카오톡
        </button>
      </div>

      <div style={{ padding: '14px', background: '#FEF3C7', borderRadius: '11px', border: '1px solid #FDE68A' }}>
        <h3 style={{ fontSize: '13px', fontWeight: 700, margin: '0 0 8px 0', color: '#7C2D12' }}>📱 폰에서 앱처럼 쓰기</h3>
        <ol style={{ fontSize: '12px', color: '#7C2D12', margin: 0, paddingLeft: '18px', lineHeight: 1.7 }}>
          <li><b>iPhone</b>: Safari에서 열고 → 공유 아이콘 → "홈 화면에 추가"</li>
          <li><b>Android</b>: Chrome에서 열고 → ⋮ 메뉴 → "홈 화면에 추가"</li>
          <li>홈 화면에 칠순 여행 앱 아이콘이 생기고, 누르면 바로 열립니다</li>
        </ol>
      </div>
    </ModalOverlay>
  );
}

function ModalOverlay({ children, onClose }) {
  useEffect(() => {
    const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handleEsc);
    document.body.style.overflow = 'hidden';
    return () => {
      window.removeEventListener('keydown', handleEsc);
      document.body.style.overflow = '';
    };
  }, [onClose]);

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)',
      backdropFilter: 'blur(4px)', zIndex: 1000,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '16px', overflowY: 'auto',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: 'white', borderRadius: '18px', padding: '22px',
        maxWidth: '500px', width: '100%', maxHeight: '90vh', overflowY: 'auto',
        boxShadow: '0 25px 60px rgba(0,0,0,0.25)', animation: 'fadeIn 0.2s ease-out',
      }}>{children}</div>
    </div>
  );
}
